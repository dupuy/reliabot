name: 'Privileged release and publishing tasks'

# This workflow handles tasks that require write permissions or OIDC tokens.
# It is triggered after the completion of the main CI workflow.
# Since it runs in the context of the main branch, it has access to secrets
# even for pull requests from forks.

on:
  workflow_run:
    workflows:
      ['Test, build, release, upload, publish, and tag Python Poetry app']
    types:
      - completed

permissions:
  contents: write
  id-token: write

jobs:
  privileged-tasks:
    runs-on: ubuntu-24.04
    # Security: only run if the triggering workflow succeeded and it was a PR.
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.repository == 'dupuy/reliabot'

    environment:
      name: test-pypi
      url: https://test.pypi.org/p/reliabot

    steps:
      - name: 'Harden runner'
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          disable-sudo: true
          egress-policy: audit
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            upload.pypi.org:443
            uploads.github.com:443

      - name: 'Download artifacts'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run download ${{ github.event.workflow_run.id }} --dir artifacts

      - name: 'Load metadata and prepare environment'
        id: metadata
        run: |
          METADATA_FILE=$(find artifacts -name metadata.json | head -n 1)
          if [ -z "$METADATA_FILE" ]; then
            echo "No metadata.json found. This might not be a release-related run."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Extract values using jq
          {
            echo "VERSION_TAG=$(jq -r '.VERSION_TAG' "$METADATA_FILE")"
            echo "PR_RELEASE=$(jq -r '.["pr-release"]' "$METADATA_FILE")"
            echo "PR_TAG=$(jq -r '.["pr-tag"]' "$METADATA_FILE")"
            echo "RELEASE_NAME=$(jq -r '.["release-name"]' "$METADATA_FILE")"
            echo "ARTIFACT_DIR=$(dirname "$METADATA_FILE")"
          } >> "$GITHUB_ENV"

          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: 'Create draft release'
        if: steps.metadata.outputs.skip == 'false' && env.PR_TAG == 'true'
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: '${{ env.ARTIFACT_DIR }}/*'
          bodyFile: '${{ env.ARTIFACT_DIR }}/release-notes.md'
          draft: true
          name: '${{ env.RELEASE_NAME }}'
          prerelease: "${{ env.PR_RELEASE == 'true' && 'false' || 'true' }}"
          tag: '${{ env.VERSION_TAG }}'
          updateOnlyUnreleased: true

      - name: 'Publish to TestPyPI'
        if: steps.metadata.outputs.skip == 'false' && env.PR_TAG == 'true'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: '${{ env.ARTIFACT_DIR }}/'
