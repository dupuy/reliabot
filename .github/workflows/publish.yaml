name: 'Publish release'

# This workflow handles tasks that require write permissions or OIDC tokens.
# It is triggered after the completion of the main CI workflow.
# Since it runs in the context of the main branch, it has access to secrets
# and OIDC tokens even for pull requests from forks.

on:
  workflow_run:
    workflows: ['Test, build, release, and upload Python Poetry app']
    types:
      - completed

# Declare default permissions as read only.
permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      actions: read # Needed to download artifacts
    # Security: only run if the triggering workflow succeeded and it was a push.
    if: >
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.repository == 'dupuy/reliabot'

    outputs:
      pr-release: ${{ steps.metadata.outputs.PR_RELEASE }}
      pr-tag: ${{ steps.metadata.outputs.PR_TAG }}
      skip: ${{ steps.metadata.outputs.skip }}

    steps:
      - name: 'Harden runner'
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443

      - name: 'Download artifacts'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh run download ${{ github.event.workflow_run.id }} --dir artifacts

      - name: 'Load metadata'
        id: metadata
        run: |
          METADATA_FILE=$(find artifacts -name metadata.json | head -n 1)
          if [ -z "$METADATA_FILE" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Extract values using jq and set as outputs
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "PR_RELEASE=$(jq -r '.["pr-release"]' "$METADATA_FILE")" >> "$GITHUB_OUTPUT"
          echo "PR_TAG=$(jq -r '.["pr-tag"]' "$METADATA_FILE")" >> "$GITHUB_OUTPUT"

  test-release:
    runs-on: ubuntu-24.04
    needs: prepare
    # Only run if prepare succeeded and it's a pre-release (pr-release is false)
    if: >
      needs.prepare.outputs.skip == 'false' &&
      needs.prepare.outputs.pr-tag == 'true' &&
      needs.prepare.outputs.pr-release == 'false'

    environment:
      name: test-pypi
      url: https://test.pypi.org/p/reliabot

    permissions:
      id-token: write # Trusted publishing requires this permission
      attestations: write
      contents: write # Needed for annotated tag push
      actions: read # Needed to download artifacts

    steps:
      - name: 'Harden runner'
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            files.pythonhosted.org:443
            fulcio.sigstore.dev:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443
            pypi.org:443
            rekor.sigstore.dev:443
            releases.astral.sh:443
            test.pypi.org:443
            timestamp.sigstore.dev:443
            tuf-repo-cdn.sigstore.dev:443
            uploads.github.com:443

      - name: 'Download artifacts'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh run download ${{ github.event.workflow_run.id }} --dir artifacts

      - name: 'Load metadata and prepare environment'
        id: metadata
        run: |
          METADATA_FILE=$(find artifacts -name metadata.json | head -n 1)
          if [ -z "$METADATA_FILE" ]; then
            echo "No metadata.json found. This might not be a release-related run."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Extract values using jq
          {
            echo "VERSION_TAG=$(jq -r '.VERSION_TAG' "$METADATA_FILE")"
            echo "PR_RELEASE=$(jq -r '.["pr-release"]' "$METADATA_FILE")"
            echo "PR_TAG=$(jq -r '.["pr-tag"]' "$METADATA_FILE")"
            echo "RELEASE_NAME=$(jq -r '.["release-name"]' "$METADATA_FILE")"
            echo "ARTIFACT_DIR=$(dirname "$METADATA_FILE")"
          } | tee -a "$GITHUB_OUTPUT" >> "$GITHUB_ENV"

          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: 'Sign built artifacts'
        if: steps.metadata.outputs.skip == 'false' && steps.metadata.outputs.PR_TAG == 'true'
        uses: sigstore/gh-action-sigstore-python@04cffa1d795717b140764e8b640de88853c92acc # v3.3.0
        with:
          inputs: >
            ${{ steps.metadata.outputs.ARTIFACT_DIR }}/*.tar.gz
            ${{ steps.metadata.outputs.ARTIFACT_DIR }}/*.whl
            ${{ steps.metadata.outputs.ARTIFACT_DIR }}/reliabot.spdx.json

      - name: 'Attest SBOM'
        if: steps.metadata.outputs.skip == 'false' && steps.metadata.outputs.PR_TAG == 'true'
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: '${{ steps.metadata.outputs.ARTIFACT_DIR }}/*'
          sbom-path: '${{ steps.metadata.outputs.ARTIFACT_DIR }}/reliabot.spdx.json'

      - name: 'Create draft release'
        if: steps.metadata.outputs.skip == 'false' && steps.metadata.outputs.PR_TAG == 'true'
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: '${{ steps.metadata.outputs.ARTIFACT_DIR }}/*'
          bodyFile: '${{ steps.metadata.outputs.ARTIFACT_DIR }}/release-notes.md'
          draft: true
          name: '${{ steps.metadata.outputs.RELEASE_NAME }}'
          prerelease: "${{ steps.metadata.outputs.PR_RELEASE == 'true' && 'false' || 'true' }}"
          tag: '${{ steps.metadata.outputs.VERSION_TAG }}'
          updateOnlyUnreleased: true

      - name: 'Prepare packages for TestPyPI'
        if: steps.metadata.outputs.skip == 'false' && steps.metadata.outputs.PR_TAG == 'true'
        run: |
          mkdir -p test_pypi_dist
          cp ${{ steps.metadata.outputs.ARTIFACT_DIR }}/*.tar.gz test_pypi_dist/
          cp ${{ steps.metadata.outputs.ARTIFACT_DIR }}/*.whl test_pypi_dist/

      - name: 'Publish to TestPyPI'
        if: steps.metadata.outputs.skip == 'false' && steps.metadata.outputs.PR_TAG == 'true'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          attestations: true
          packages-dir: 'test_pypi_dist/'
          repository-url: https://test.pypi.org/legacy/

  pypi-release:
    runs-on: ubuntu-24.04
    needs: prepare
    # Only run if prepare succeeded and it's a full release (pr-release is true)
    if: >
      needs.prepare.outputs.skip == 'false' &&
      needs.prepare.outputs.pr-tag == 'true' &&
      needs.prepare.outputs.pr-release == 'true'

    environment:
      name: pypi
      url: https://pypi.org/p/reliabot

    permissions:
      id-token: write # Trusted publishing requires this permission
      attestations: write
      contents: write # Needed for annotated tag push
      actions: read # Needed to download artifacts

    steps:
      - name: 'Harden runner'
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            files.pythonhosted.org:443
            fulcio.sigstore.dev:443
            ghcr.io:443
            github.com:443
            pkg-containers.githubusercontent.com:443
            pypi.org:443
            rekor.sigstore.dev:443
            releases.astral.sh:443
            timestamp.sigstore.dev:443
            tuf-repo-cdn.sigstore.dev:443
            upload.pypi.org:443
            uploads.github.com:443

      - name: 'Checkout repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: 'Download artifacts'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh run download ${{ github.event.workflow_run.id }} --dir artifacts

      - name: 'Load metadata and prepare environment'
        id: metadata
        run: |
          METADATA_FILE=$(find artifacts -name metadata.json | head -n 1)
          if [ -z "$METADATA_FILE" ]; then
            echo "No metadata.json found. Skipping production release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Extract values using jq
          {
            echo "VERSION_TAG=$(jq -r '.VERSION_TAG' "$METADATA_FILE")"
            echo "PR_RELEASE=$(jq -r '.["pr-release"]' "$METADATA_FILE")"
            echo "PR_TAG=$(jq -r '.["pr-tag"]' "$METADATA_FILE")"
            echo "RELEASE_NAME=$(jq -r '.["release-name"]' "$METADATA_FILE")"
            echo "ARTIFACT_DIR=$(dirname "$METADATA_FILE")"
          } | tee -a "$GITHUB_OUTPUT" >> "$GITHUB_ENV"

          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: 'Sign built artifacts'
        if: steps.metadata.outputs.skip == 'false' && steps.metadata.outputs.PR_TAG == 'true'
        uses: sigstore/gh-action-sigstore-python@04cffa1d795717b140764e8b640de88853c92acc # v3.3.0
        with:
          inputs: >
            ${{ steps.metadata.outputs.ARTIFACT_DIR }}/*.tar.gz
            ${{ steps.metadata.outputs.ARTIFACT_DIR }}/*.whl
            ${{ steps.metadata.outputs.ARTIFACT_DIR }}/reliabot.spdx.json

      - name: 'Attest SBOM'
        if: steps.metadata.outputs.skip == 'false' && steps.metadata.outputs.PR_TAG == 'true'
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: '${{ steps.metadata.outputs.ARTIFACT_DIR }}/*'
          sbom-path: '${{ steps.metadata.outputs.ARTIFACT_DIR }}/reliabot.spdx.json'

      - name: 'Prepare packages for PyPI'
        if: steps.metadata.outputs.skip == 'false' && steps.metadata.outputs.PR_TAG == 'true'
        run: |
          mkdir -p pypi_dist
          cp ${{ steps.metadata.outputs.ARTIFACT_DIR }}/*.tar.gz pypi_dist/
          cp ${{ steps.metadata.outputs.ARTIFACT_DIR }}/*.whl pypi_dist/

      - name: 'Publish to PyPI'
        if: steps.metadata.outputs.skip == 'false' && steps.metadata.outputs.PR_TAG == 'true'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          attestations: true
          packages-dir: 'pypi_dist/'

      - name: 'Create and push tag'
        if: steps.metadata.outputs.skip == 'false' && steps.metadata.outputs.PR_TAG == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          if [ "$PR_RELEASE" = "true" ]; then
            # Annotated tag for final release
            git tag -a "$VERSION_TAG" -F "${{ steps.metadata.outputs.ARTIFACT_DIR }}/release-notes.md"
          else
            # Light-weight tag for pre-release
            git tag "$VERSION_TAG"
          fi
          git push origin "$VERSION_TAG"

      - name: 'Finalize GitHub release'
        if: steps.metadata.outputs.skip == 'false' && steps.metadata.outputs.PR_TAG == 'true'
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          allowUpdates: true
          # Re-upload artifacts to ensure signatures are present in the final release
          artifacts: '${{ steps.metadata.outputs.ARTIFACT_DIR }}/*'
          draft: false
          name: '${{ steps.metadata.outputs.RELEASE_NAME }}'
          prerelease: "${{ steps.metadata.outputs.PR_RELEASE == 'true' && 'false' || 'true' }}"
          tag: '${{ steps.metadata.outputs.VERSION_TAG }}'
          updateOnlyUnreleased: true
