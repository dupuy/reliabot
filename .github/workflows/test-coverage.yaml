name: 'Run tests with coverage'

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
    types:
      - opened
      - ready_for_review
      - reopened
      - synchronize

# Declare default permissions as read only.
permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-24.04

    steps:
      - name: 'Harden runner'
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            files.pythonhosted.org:443
            github.com:443
            pypi.org:443

      - name: 'Checkout repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # The `git describe` COMMIT_TAG output requires these fetch-* options.
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: 'Install Poetry'
        run: 'pipx install poetry'

      - name: 'Compute outputs'
        id: computed
        run: >
          {
            COMMIT_TAG=$(git describe) &&
              echo "COMMIT_TAG=$COMMIT_TAG" >&2 ;
            VERSION_TAG="v$(poetry version --short |
              sed -e 's/a/-alpha./' -e 's/b/-beta./' -e 's/rc/-rc./')" &&
                echo "VERSION_TAG=$VERSION_TAG" ;
            if [ "$COMMIT_TAG" = "$VERSION_TAG" ]; then
              echo "pr-commit=false" ;
            else
              echo "pr-commit=true" ;
            fi
          } | tee -a "$GITHUB_OUTPUT"

      - name: 'Set up Python'
        if: steps.computed.outputs.pr-commit == 'true'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'
          cache: 'poetry'

      - name: 'Install dependencies with extras'
        if: steps.computed.outputs.pr-commit == 'true'
        run: 'poetry install --extras re2 --with testing'

      - name: 'Run tests with coverage'
        if: steps.computed.outputs.pr-commit == 'true'
        run: 'poetry run tox -e py'

      - name: 'Upload coverage report'
        if: steps.computed.outputs.pr-commit == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          if-no-files-found: error
          name: coverage-report
          path: cobertura.xml
          retention-days: 1
